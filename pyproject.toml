[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "codex-tui"
version = "0.1.0"
description = "A terminal UI for managing multiple OpenAI Codex agent threads"
requires-python = ">=3.11"
dependencies = [
    "textual>=3.0",
    "pydantic>=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "textual-dev>=1.0",
]

[project.scripts]
codex-tui = "codex_tui.__main__:main"
